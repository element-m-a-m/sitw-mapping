  const toPool=(a,ci,si,ii)=>{pushH(cls,pool);const nc=clone(cls);const[item]=nc[ci].s[si].splice(ii,1);setCls(nc);if(item)setPool(p=>[...p,item]);};

  const pasteToCell=(ci,si)=>{if(!window.__clip)return;pushH(cls,pool);const nc=clone(cls);nc[ci].s[si].push({...clone(window.__clip),id:uid()});setCls(nc);};
  const pasteToPool=()=>{if(!window.__clip)return;pushH(cls,pool);setPool(p=>[...p,{...clone(window.__clip),id:uid()}]);};

  const openFull=(a,ci,si,ii)=>{const it=a==="c"?cls[ci].s[si][ii]:pool[si];setEditing({a,ci,si,ii});setEv({name:it.name,heb:it.heb,vid:it.vid,cat:it.cat,fn:it.fn||"",txt:it.txt||""});};
  const saveFull=()=>{if(!editing)return;pushH(cls,pool);const{a,ci,si,ii}=editing;if(a==="c"){const nc=clone(cls);Object.assign(nc[ci].s[si][ii],ev);setCls(nc);}else{const np=clone(pool);Object.assign(np[si],ev);setPool(np);}setEditing(null);};
  const openAdd=(ci,si)=>{setAdding({ci,si});setNv({name:"",heb:"",vid:"",cat:"Cat 1",fl:null,fn:"",txt:""});};
  const doAdd=()=>{if(!adding)return;pushH(cls,pool);const nc=clone(cls);nc[adding.ci].s[adding.si].push({...nv,id:uid()});setCls(nc);setAdding(null);};

  const flg=f=>f==="blocker"?{bg:"#FEE2E2",i:"⛔",t:"BLOCKER"}:f==="check"?{bg:"#FEF3C7",i:"⚠️",t:"CHECK"}:f==="gap"?{bg:"#DBEAFE",i:"📋",t:"GAP"}:f==="decision"?{bg:"#F3E8FF",i:"🤔",t:"DECIDE"}:null;
  const allItems=cls.reduce((a,c)=>a+c.s.reduce((b,sl)=>b+sl.length,0),0);
  const stats={total:allItems,bl:cls.reduce((a,c)=>a+c.s.reduce((b,sl)=>b+sl.filter(x=>x.fl==="blocker").length,0),0),gap:cls.reduce((a,c)=>a+c.s.reduce((b,sl)=>b+sl.filter(x=>x.fl==="gap").length,0),0),ch:cls.reduce((a,c)=>a+c.s.reduce((b,sl)=>b+sl.filter(x=>x.fl==="check").length,0),0)};
  const isOver=(a,ci,si)=>dropTarget&&dropTarget.a===a&&dropTarget.ci===ci&&dropTarget.si===si;

  /* ── Inline editable field ── */
  const Inline=({a,ci,si,ii,field,value,sty,multi})=>{
    const active=inlineEdit&&inlineEdit.a===a&&inlineEdit.ci===ci&&inlineEdit.si===si&&inlineEdit.ii===ii&&inlineEdit.field===field;
    const ref=useRef(null);
    useEffect(()=>{if(active&&ref.current){ref.current.focus();try{const len=(ref.current.value||"").length;ref.current.setSelectionRange(len,len);}catch(e){}}},[active]);
    if(active){const bs={...sty,background:"#fff",border:"1px solid #93C5FD",borderRadius:3,padding:"1px 3px",outline:"none",width:"100%",resize:"none",direction:"rtl",fontFamily:"inherit"};const kd=e=>{if(e.key==="Enter"&&!e.shiftKey&&!multi){e.preventDefault();commitInline();}if(e.key==="Escape")commitInline();e.stopPropagation();};const ch=e=>setField(a,ci,si,ii,field,e.target.value);if(multi)return<textarea ref={ref} value={value||""} onChange={ch} onBlur={commitInline} onKeyDown={kd} rows={2} style={{...bs,fontSize:8.5,lineHeight:1.3,minHeight:24}} onClick={e=>e.stopPropagation()}/>;return<input ref={ref} value={value||""} onChange={ch} onBlur={commitInline} onKeyDown={kd} style={bs} onClick={e=>e.stopPropagation()}/>;
    }
    const dbl=e=>{e.stopPropagation();e.preventDefault();startInline(a,ci,si,ii,field);};
    const hov={onMouseEnter:e=>{e.currentTarget.style.background="rgba(0,0,0,.04)"},onMouseLeave:e=>{e.currentTarget.style.background="transparent"}};
    if(multi)return<div onDoubleClick={dbl}{...hov}style={{...sty,cursor:"text",minHeight:14,borderRadius:2,padding:"0 2px"}}>{value||<span style={{color:"#C0C0C0",fontStyle:"italic",fontSize:7.5}}>+ טקסט...</span>}</div>;
    return<div onDoubleClick={dbl}{...hov}style={{...sty,cursor:"text",borderRadius:2,padding:"0 2px"}}>{value||<span style={{color:"#C0C0C0",fontStyle:"italic",fontSize:7.5}}>—</span>}</div>;
  };

  /* ── Card ── */
  const Card=({it,a,ci,si,ii})=>{
    const cat=CAT[it.cat]||CAT.Skip;const fi=flg(it.fl);
    const anyEdit=inlineEdit&&inlineEdit.a===a&&inlineEdit.ci===ci&&inlineEdit.si===si&&inlineEdit.ii===ii;
    const showCtx=e=>{e.preventDefault();e.stopPropagation();setCtxMenu({x:e.clientX,y:e.clientY,a,ci,si,ii});};
    return(<div draggable={!anyEdit?"true":"false"} onDragStart={e=>dStart(e,a==="c"?{a:"c",ci,si,ii}:{a:"u",pi:si})} onDragEnd={dEnd} onContextMenu={showCtx}
      style={{background:cat.bg,border:`1.5px solid ${cat.bd}`,borderRadius:6,padding:"4px 6px",cursor:anyEdit?"default":"grab",position:"relative",minHeight:44,boxShadow:"0 1px 2px rgba(0,0,0,.04)",marginBottom:a==="c"?2:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:2}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:3,flexWrap:"wrap",marginBottom:1}}>
            {it.vid&&<span className="mono" style={{display:"inline-block",background:cat.c,color:"#fff",fontSize:8,fontWeight:600,padding:"0 4px",borderRadius:3,letterSpacing:.3}}>{it.vid}</span>}
            {it.cat!=="Skip"&&it.cat!=="Text"&&<span style={{display:"inline-block",background:"rgba(0,0,0,.05)",color:cat.c,fontSize:7,fontWeight:700,padding:"0 4px",borderRadius:3}}>{cat.l}</span>}
          </div>
          <Inline a={a} ci={ci} si={si} ii={ii} field="heb" value={it.heb} sty={{fontSize:11.5,fontWeight:800,color:"#111827",lineHeight:1.2,direction:"rtl",textAlign:"right"}}/>
          <Inline a={a} ci={ci} si={si} ii={ii} field="name" value={it.name} sty={{fontSize:9,color:"#6B7280",lineHeight:1.15,marginTop:1}}/>
          <Inline a={a} ci={ci} si={si} ii={ii} field="txt" value={it.txt} multi sty={{fontSize:8.5,color:"#475569",lineHeight:1.25,marginTop:2,direction:"rtl",textAlign:"right",whiteSpace:"pre-wrap",wordBreak:"break-word"}}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0,marginTop:1}}>
          {a==="c"&&<button onClick={e=>{e.stopPropagation();toPool(a,ci,si,ii);}} onMouseDown={e=>e.stopPropagation()} title="שלח למאגר" style={{background:"none",border:"none",cursor:"pointer",color:"#6B7280",fontSize:10,padding:0,lineHeight:1}}>↩</button>}
          <button onClick={e=>{e.stopPropagation();delItem(a,ci,si,ii);}} onMouseDown={e=>e.stopPropagation()} title="מחק" style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:10,padding:0,lineHeight:1}}>×</button>
        </div>
      </div>
      {fi&&<div style={{marginTop:2,display:"flex",alignItems:"center",gap:2,background:fi.bg,borderRadius:3,padding:"1px 4px"}}><span style={{fontSize:7}}>{fi.i}</span><span style={{fontSize:7,fontWeight:700,color:"#92400E",letterSpacing:.3}}>{fi.t}</span>{it.fn&&<span style={{fontSize:7,color:"#78716C",marginLeft:2}}>{it.fn}</span>}</div>}
    </div>);
  };

  /* ── Slot cell ── */
  const SlotCell=({items,ci,si})=>{
    const drop=isOver("c",ci,si);
    return(<div onDragOver={e=>dOver(e,{a:"c",ci,si})} onDragLeave={dLeave} onDrop={e=>dDropCell(e,ci,si)} onContextMenu={e=>{if(items.length===0||e.target===e.currentTarget){e.preventDefault();setCtxMenu({x:e.clientX,y:e.clientY,a:"cell",ci,si});}}}
      style={{minHeight:52,borderRadius:6,padding:2,border:drop?"2px solid #3B82F6":"2px solid transparent",background:drop?"#EFF6FF":"transparent",transition:"border-color .1s, background .1s"}}>

      {items.length===0&&(<div onClick={()=>openAdd(ci,si)} style={{height:48,display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #D1D5DB",borderRadius:6,cursor:"pointer",background:"#FAFAFA"}}><span style={{color:"#9CA3AF",fontSize:10}}>+ הוסף</span></div>)}
    </div>);
  };

  const fc=filt==="all"?cls:cls.filter(c=>c.p===filt);
  const poolH=poolOpen?Math.min(50,Math.max(25,pool.length*8+10)):0;

  return(<div style={{minHeight:"100vh",paddingBottom:poolOpen?`${poolH}vh`:"50px"}}>
    {/* TOOLBAR */}
    <div className="no-print" style={{position:"sticky",top:0,zIndex:50,background:"#0F172A",color:"#fff",padding:"7px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:5,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>

      <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>

        <button onClick={undo} disabled={!hist.length} style={{padding:"3px 8px",fontSize:10,fontWeight:600,borderRadius:4,border:"1px solid #475569",background:"#1E293B",color:hist.length?"#E2E8F0":"#475569",cursor:hist.length?"pointer":"default"}}>↶</button>
        <button onClick={redo} disabled={!fut.length} style={{padding:"3px 8px",fontSize:10,fontWeight:600,borderRadius:4,border:"1px solid #475569",background:"#1E293B",color:fut.length?"#E2E8F0":"#475569",cursor:fut.length?"pointer":"default"}}>↷</button>

      </div>
    </div>
    {/* STATS */}
    <div className="no-print" style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"5px 14px",display:"flex",gap:12,flexWrap:"wrap",fontSize:10}}>

    </div>
    {/* TABLE */}
    <div className="print-root" style={{overflowX:"auto",padding:"0 0 20px"}}>

            <div style={{fontSize:8,fontWeight:700,color:"#64748B",padding:"2px 5px"}}>שיעור</div>
            {SLOTS.map(s=><div key={s.k} style={{fontSize:8,fontWeight:700,color:"#475569",padding:"3px 4px",background:s.bg,borderRadius:3,textAlign:"center"}}>{s.i} <span style={{fontWeight:800}}>{s.h}</span> <span style={{fontSize:7,opacity:.6}}>/ {s.e}</span></div>)}
          </div>
        </div>
        {fc.map(c=>{const ri=cls.findIndex(x=>x.n===c.n);const ic=coll[c.n];return(
          <div key={c.n} className="class-row" style={{marginTop:3,background:"#fff",borderRadius:7,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,.03)"}}>

                <div style={{fontSize:7.5,fontWeight:700,opacity:.6}}>חלק {c.p}</div>
                <div className="heb" style={{fontSize:14,fontWeight:800,lineHeight:1.1}}>{c.n}. {c.t}</div>
                <div style={{fontSize:8,opacity:.7}}>{c.te}</div>
                {!ic&&<div className="heb" style={{fontSize:7,opacity:.5,marginTop:2,lineHeight:1.2}}>{c.th}</div>}
                <div style={{fontSize:8,marginTop:2,opacity:.4}}>{ic?"▸":"▾"}</div>
              </div>
              {!ic&&(<div className="grid-slots" style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:3,padding:3,alignItems:"start"}} onClick={e=>e.stopPropagation()}>{c.s.map((slot,si)=><SlotCell key={si} items={slot} ci={ri} si={si}/>)}</div>)}
              {ic&&(<div style={{padding:"6px 8px",display:"flex",alignItems:"center",gap:3,flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>{c.s.flatMap((slot,si)=>slot.map(it=>{const cat=CAT[it.cat]||CAT.Skip;const fi=flg(it.fl);return<span key={it.id} style={{fontSize:7.5,padding:"1px 4px",borderRadius:3,background:fi?fi.bg:cat.bg,border:`1px solid ${cat.bd}`,color:cat.c,fontWeight:700,whiteSpace:"nowrap"}}>{it.vid||"TXT"}</span>;}))}</div>)}
            </div>
          </div>);})}
      </div>
    </div>

    {/* ── FLOATING POOL WIDGET ── */}
    <div className="pool-widget no-print" onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";if(!poolOpen)setPoolOpen(true);}} onDrop={dDropPool}
      style={{position:"fixed",bottom:0,left:0,right:0,zIndex:60,background:"#fff",borderTop:"2px solid #CBD5E1",boxShadow:"0 -4px 16px rgba(0,0,0,.1)",transition:"max-height .25s ease",maxHeight:poolOpen?"50vh":"40px",display:"flex",flexDirection:"column"}}>
      {/* Header bar — always visible */}
      <div onClick={()=>setPoolOpen(p=>!p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 14px",cursor:"pointer",background:"#F8FAFC",borderBottom:poolOpen?"1px solid #E2E8F0":"none",flexShrink:0,minHeight:38}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{poolOpen?"▾":"▴"}</span>
          <span className="heb" style={{fontSize:13,fontWeight:800}}>🎯 מאגר סרטונים</span>
          <span style={{fontSize:10,color:"#6B7280",fontWeight:600}}>({pool.length})</span>
          {window.__clip&&<span style={{fontSize:9,color:"#2563EB",fontWeight:600,marginLeft:8}}>📋 מוכן להדבקה</span>}
        </div>
        <div style={{display:"flex",gap:4}}>
          {window.__clip&&<button onClick={e=>{e.stopPropagation();pasteToPool();}} style={{padding:"2px 8px",fontSize:9,fontWeight:600,borderRadius:3,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>הדבק</button>}
          <button onClick={e=>{e.stopPropagation();setPoolOpen(p=>!p);}} style={{padding:"2px 10px",fontSize:10,fontWeight:700,borderRadius:3,border:"none",cursor:"pointer",background:poolOpen?"#3B82F6":"#334155",color:"#fff"}}>{poolOpen?"סגור":"פתח"}</button>
        </div>
      </div>
      {/* Pool content — scrollable */}
      {poolOpen&&(<div style={{flex:1,overflowY:"auto",padding:10}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(185px, 1fr))",gap:4}}>
          {pool.map((it,i)=><Card key={it.id||i} it={it} a="u" ci={null} si={i} ii={0}/>)}
          {!pool.length&&<div style={{color:"#9CA3AF",fontSize:11,padding:8,gridColumn:"1/-1"}}>הכל משובץ!</div>}
        </div>
      </div>)}
    </div>

    {/* ── CONTEXT MENU ── */}
    {ctxMenu&&(<div style={{position:"fixed",top:ctxMenu.y,left:ctxMenu.x,zIndex:200,background:"#fff",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,.2)",border:"1px solid #E2E8F0",padding:"4px 0",minWidth:160}} onClick={e=>e.stopPropagation()}>
      {ctxMenu.a==="cell"?(<>
        {window.__clip&&<div onClick={()=>{pasteToCell(ctxMenu.ci,ctxMenu.si);setCtxMenu(null);}} style={menuS}>📋 הדבק כאן</div>}
        <div onClick={()=>{openAdd(ctxMenu.ci,ctxMenu.si);setCtxMenu(null);}} style={menuS}>➕ הוסף חדש</div>
      </>):(<>
        <div onClick={()=>{openFull(ctxMenu.a,ctxMenu.ci,ctxMenu.si,ctxMenu.ii);setCtxMenu(null);}} style={menuS}>✏️ ערוך הכל</div>
        <div onClick={()=>{copyItem(ctxMenu.a,ctxMenu.ci,ctxMenu.si,ctxMenu.ii);setCtxMenu(null);}} style={menuS}>📋 העתק</div>
        <div onClick={()=>{dupItem(ctxMenu.a,ctxMenu.ci,ctxMenu.si,ctxMenu.ii);setCtxMenu(null);}} style={menuS}>📑 שכפל</div>
        {window.__clip&&ctxMenu.a==="c"&&<div onClick={()=>{pasteToCell(ctxMenu.ci,ctxMenu.si);setCtxMenu(null);}} style={menuS}>📌 הדבק לתא</div>}
        <div style={{height:1,background:"#E2E8F0",margin:"3px 0"}}/>
        {ctxMenu.a==="c"&&<div onClick={()=>{toPool(ctxMenu.a,ctxMenu.ci,ctxMenu.si,ctxMenu.ii);setCtxMenu(null);}} style={menuS}>↩ שלח למאגר</div>}
        <div onClick={()=>{delItem(ctxMenu.a,ctxMenu.ci,ctxMenu.si,ctxMenu.ii);setCtxMenu(null);}} style={{...menuS,color:"#DC2626"}}>🗑️ מחק</div>
      </>)}
    </div>)}

    {/* FULL EDIT MODAL */}
    {editing&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setEditing(null)}><div style={{background:"#fff",borderRadius:10,padding:18,width:400,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
      <h3 className="heb" style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>עריכת תרגיל — כל השדות</h3>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {[["שם (עברית)","heb",true],["Name (EN)","name",false],["Video ID","vid",false],["הערה","fn",false]].map(([lb,k,rtl])=><label key={k} style={{fontSize:10,fontWeight:600}}>{lb}<input dir={rtl?"rtl":"ltr"} value={ev[k]||""} onChange={e=>setEv(v=>({...v,[k]:e.target.value}))} style={{width:"100%",padding:"4px 7px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:11,marginTop:1,fontFamily:k==="vid"?"'DM Mono',monospace":"inherit"}}/></label>)}
        <label style={{fontSize:10,fontWeight:600}}>טקסט<textarea dir="rtl" value={ev.txt||""} onChange={e=>setEv(v=>({...v,txt:e.target.value}))} rows={3} style={{width:"100%",padding:"4px 7px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:11,marginTop:1,resize:"vertical"}}/></label>
        <label style={{fontSize:10,fontWeight:600}}>קטגוריה<select value={ev.cat} onChange={e=>setEv(v=>({...v,cat:e.target.value}))} style={{width:"100%",padding:"4px 7px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:11,marginTop:1}}>{Object.entries(CAT).map(([k,v])=><option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:5,marginTop:12}}>
        <button onClick={()=>setEditing(null)} style={{padding:"4px 12px",fontSize:11,borderRadius:4,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>ביטול</button>

      </div>
    </div></div>)}
    {/* ADD MODAL */}
    {adding&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setAdding(null)}><div style={{background:"#fff",borderRadius:10,padding:18,width:380,maxWidth:"92vw",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
      <h3 className="heb" style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>הוספת תרגיל — שיעור {cls[adding.ci]?.n}, משבצת {adding.si+1}</h3>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {[["שם (עברית)","heb",true],["Name (EN)","name",false],["Video ID","vid",false]].map(([lb,k,rtl])=><label key={k} style={{fontSize:10,fontWeight:600}}>{lb}<input dir={rtl?"rtl":"ltr"} value={nv[k]||""} onChange={e=>setNv(v=>({...v,[k]:e.target.value}))} style={{width:"100%",padding:"4px 7px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:11,marginTop:1}}/></label>)}
        <label style={{fontSize:10,fontWeight:600}}>קטגוריה<select value={nv.cat} onChange={e=>setNv(v=>({...v,cat:e.target.value}))} style={{width:"100%",padding:"4px 7px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:11,marginTop:1}}>{Object.entries(CAT).map(([k,v])=><option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:5,marginTop:12}}>
        <button onClick={()=>setAdding(null)} style={{padding:"4px 12px",fontSize:11,borderRadius:4,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>ביטול</button>
        <button onClick={doAdd} style={{padding:"4px 12px",fontSize:11,fontWeight:700,borderRadius:4,border:"none",background:"#059669",color:"#fff",cursor:"pointer"}}>הוסף</button>
      </div>
    </div></div>)}
  </div>);
}

const menuS={padding:"6px 14px",fontSize:11,cursor:"pointer",fontWeight:600,transition:"background .1s"};
// Add hover effect via onMouseEnter/Leave would need more code, using CSS-in-JS shortcut
const style=document.createElement("style");
style.textContent=`[style*="cursor: pointer"]:hover{background:#F1F5F9}`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
