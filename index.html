function App() {
  const [cls, setCls] = useState(()=>clone(IC));
  const [pool, setPool] = useState(()=>clone(IU));
  const [hist, setHist] = useState([]);
  const [fut, setFut] = useState([]);
  const [dragSrc, setDragSrc] = useState(null);
  const [ovr, setOvr] = useState(null);
  const [editing, setEditing] = useState(null);
  const [ev, setEv] = useState({});
  const [adding, setAdding] = useState(null);
  const [nv, setNv] = useState({});
  const [filt, setFilt] = useState("all");
  const [coll, setColl] = useState({});
  const dragRef = useRef(null);

  const push = useCallback(()=>{setHist(h=>[...h.slice(-40),{c:clone(cls),p:clone(pool)}]);setFut([]);},[cls,pool]);
  const undo = useCallback(()=>{if(!hist.length)return;const prev=hist[hist.length-1];setFut(f=>[...f,{c:clone(cls),p:clone(pool)}]);setCls(prev.c);setPool(prev.p);setHist(h=>h.slice(0,-1));},[hist,cls,pool]);
  const redo = useCallback(()=>{if(!fut.length)return;const next=fut[fut.length-1];setHist(h=>[...h,{c:clone(cls),p:clone(pool)}]);setCls(next.c);setPool(next.p);setFut(f=>f.slice(0,-1));},[fut,cls,pool]);
  const reset = ()=>{push();setCls(clone(IC));setPool(clone(IU));};

  useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo();}if((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))){e.preventDefault();redo();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[undo,redo]);

  const handleDragStart = (e, source) => {
    dragRef.current = source;
    setDragSrc(source);
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", JSON.stringify(source));
  };
  const handleDragOver = (e, target) => { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = "move"; setOvr(target); };
  const handleDragLeave = (e) => { e.stopPropagation(); setOvr(null); };
  const handleDragEnd = () => { dragRef.current = null; setDragSrc(null); setOvr(null); };

  const handleDrop = (e, target) => {
    e.preventDefault(); e.stopPropagation(); setOvr(null);
    const source = dragRef.current;
    if (!source) return;
    if (source.a === target.a && source.ci === target.ci && source.si === target.si) { handleDragEnd(); return; }
    push();
    const nc = clone(cls), np = clone(pool);
    let srcItem;
    if (source.a === "c") srcItem = nc[source.ci].s[source.si]; else srcItem = np[source.si];
    if (target.a === "c") {
      const tgtItem = nc[target.ci].s[target.si];
      if (source.a === "c") { nc[target.ci].s[target.si] = srcItem; nc[source.ci].s[source.si] = tgtItem; }
      else { nc[target.ci].s[target.si] = srcItem; np[source.si] = tgtItem; }
    } else {
      if (source.a === "c") { np.push(srcItem); nc[source.ci].s[source.si] = mk("(empty)","","","Skip"); }
      else { const [r] = np.splice(source.si, 1); np.splice(target.si, 0, r); }
    }
    setCls(nc); setPool(np); handleDragEnd();
  };

  const del = (a, ci, si) => { push(); if (a === "c") { const nc = clone(cls); const r = nc[ci].s[si]; nc[ci].s[si] = mk("(empty)","","","Skip"); setCls(nc); if (r.name !== "(empty)" && r.cat !== "Skip") setPool(p => [...p, r]); } else { const np = clone(pool); np.splice(si, 1); setPool(np); } };
  const startEdit = (a, ci, si) => { const it = a === "c" ? cls[ci].s[si] : pool[si]; setEditing({ a, ci, si }); setEv({ name: it.name, heb: it.heb, vid: it.vid, cat: it.cat, fn: it.fn || "" }); };
  const saveEdit = () => { if (!editing) return; push(); const { a, ci, si } = editing; if (a === "c") { const nc = clone(cls); Object.assign(nc[ci].s[si], ev); setCls(nc); } else { const np = clone(pool); Object.assign(np[si], ev); setPool(np); } setEditing(null); };
  const openAdd = (ci, si) => { setAdding({ ci, si }); setNv({ name: "", heb: "", vid: "", cat: "Cat 1", fl: null, fn: "" }); };
  const doAdd = () => { if (!adding) return; push(); const nc = clone(cls); nc[adding.ci].s[adding.si] = { ...nv, id: uid() }; setCls(nc); setAdding(null); };

  const flg = f => f === "blocker" ? { bg: "#FEE2E2", i: "\u26D4", t: "BLOCKER", tc: "#991B1B" } : f === "check" ? { bg: "#FEF3C7", i: "\u26A0\uFE0F", t: "CHECK", tc: "#92400E" } : f === "gap" ? { bg: "#DBEAFE", i: "\u{1F4CB}", t: "GAP", tc: "#1E40AF" } : f === "decision" ? { bg: "#F3E8FF", i: "\u{1F914}", t: "DECIDE", tc: "#6B21A8" } : null;
  const stats = { total: cls.reduce((a, c) => a + c.s.filter(s => s.cat !== "Skip" && s.name !== "(empty)").length, 0), bl: cls.reduce((a, c) => a + c.s.filter(s => s.fl === "blocker").length, 0), gap: cls.reduce((a, c) => a + c.s.filter(s => s.fl === "gap").length, 0), ch: cls.reduce((a, c) => a + c.s.filter(s => s.fl === "check").length, 0) };

  const Block = ({ it, a, ci, si }) => {
    const cat = CAT[it.cat] || CAT.Skip; const fi = flg(it.fl);
    const isDragging = dragSrc && dragSrc.a === a && dragSrc.ci === ci && dragSrc.si === si;
    const isOver = ovr && ovr.a === a && ovr.ci === ci && ovr.si === si;
    if (it.name === "(empty)" || (!it.name && !it.vid)) return (
      <div onDragOver={e => handleDragOver(e, { a, ci, si })} onDrop={e => handleDrop(e, { a, ci, si })} onDragLeave={handleDragLeave} onClick={() => a === "c" && openAdd(ci, si)}
        style={{ border: "2px dashed " + (isOver ? "#3B82F6" : "#D1D5DB"), background: isOver ? "#EFF6FF" : "#FAFAFA", borderRadius: 6, padding: 6, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all .12s", minHeight: 50 }}>
        <span style={{ color: "#9CA3AF", fontSize: 10 }}>+ \u05D4\u05D5\u05E1\u05E3</span>
      </div>);
    return (
      <div draggable onDragStart={e => handleDragStart(e, { a, ci, si })} onDragEnd={handleDragEnd} onDragOver={e => handleDragOver(e, { a, ci, si })} onDrop={e => handleDrop(e, { a, ci, si })} onDragLeave={handleDragLeave} onDoubleClick={() => startEdit(a, ci, si)}
        style={{ background: cat.bg, border: "1.5px solid " + (isOver ? "#3B82F6" : cat.bd), borderRadius: 6, padding: "5px 7px", cursor: "grab", position: "relative", opacity: isDragging ? .3 : 1, transition: "all .12s", minHeight: 50, boxShadow: isOver ? "0 0 0 2px #3B82F6" : "0 1px 2px rgba(0,0,0,.04)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 3 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 3, flexWrap: "wrap", marginBottom: 1 }}>
              {it.vid && <span className="mono" style={{ display: "inline-block", background: cat.c, color: "#fff", fontSize: 9, fontWeight: 600, padding: "0 4px", borderRadius: 3, letterSpacing: .3 }}>{it.vid}</span>}
              {it.cat !== "Skip" && it.cat !== "Text" && <span style={{ display: "inline-block", background: "rgba(0,0,0,.05)", color: cat.c, fontSize: 8, fontWeight: 700, padding: "0 4px", borderRadius: 3 }}>{cat.l}</span>}
            </div>
            {it.heb && <div className="heb" style={{ fontSize: 12, fontWeight: 800, color: "#111827", lineHeight: 1.2, marginTop: 1 }}>{it.heb}</div>}
            <div style={{ fontSize: 9.5, color: "#6B7280", lineHeight: 1.15, marginTop: 1 }}>{it.name}</div>
          </div>
          <button onClick={e => { e.stopPropagation(); del(a, ci, si); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#9CA3AF", fontSize: 12, padding: "0 1px", lineHeight: 1, flexShrink: 0 }} title="Remove">\u00D7</button>
        </div>
        {fi && <div style={{ marginTop: 2, display: "flex", alignItems: "center", gap: 2, background: fi.bg, borderRadius: 3, padding: "1px 4px" }}>
          <span style={{ fontSize: 8 }}>{fi.i}</span><span style={{ fontSize: 8, fontWeight: 700, color: fi.tc, letterSpacing: .3 }}>{fi.t}</span>
          {it.fn && <span style={{ fontSize: 8, color: "#78716C", marginLeft: 2 }}>{it.fn}</span>}
        </div>}
      </div>);
  };

  const fc = filt === "all" ? cls : cls.filter(c => c.p === filt);

  return (
    <div style={{ minHeight: "100vh", maxWidth: 1100, margin: "0 auto" }}>
      {/* TOOLBAR */}
      <div style={{ position: "sticky", top: 0, zIndex: 50, background: "#0F172A", color: "#fff", padding: "7px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 5, boxShadow: "0 4px 12px rgba(0,0,0,.15)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontWeight: 800, fontSize: 14, letterSpacing: -.5 }}>\u05D0\u05D9\u05EA\u05DF \u05D1\u05E8\u05D5\u05D7</span>
          <span style={{ fontSize: 10, color: "#94A3B8" }}>\u05DE\u05D9\u05E4\u05D5\u05D9 \u05EA\u05E8\u05D2\u05D9\u05DC\u05D9\u05DD \u2014 12 \u05E9\u05D9\u05E2\u05D5\u05E8\u05D9\u05DD \u00D7 7 \u05DE\u05E9\u05D1\u05E6\u05D5\u05EA</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 2, marginRight: 4 }}>
            {["all", "A", "B", "C"].map(f => <button key={f} onClick={() => setFilt(f)} style={{ padding: "2px 8px", fontSize: 10, fontWeight: 700, borderRadius: 3, border: "none", cursor: "pointer", background: filt === f ? "#3B82F6" : "#334155", color: filt === f ? "#fff" : "#94A3B8" }}>{f === "all" ? "\u05D4\u05DB\u05DC" : "\u05D7\u05DC\u05E7 " + f}</button>)}
          </div>
          <button onClick={undo} disabled={!hist.length} style={{ padding: "3px 8px", fontSize: 10, fontWeight: 600, borderRadius: 4, border: "1px solid #475569", background: "#1E293B", color: hist.length ? "#E2E8F0" : "#475569", cursor: hist.length ? "pointer" : "default" }}>\u21B6 Undo</button>
          <button onClick={redo} disabled={!fut.length} style={{ padding: "3px 8px", fontSize: 10, fontWeight: 600, borderRadius: 4, border: "1px solid #475569", background: "#1E293B", color: fut.length ? "#E2E8F0" : "#475569", cursor: fut.length ? "pointer" : "default" }}>\u21B7 Redo</button>
          <button onClick={reset} style={{ padding: "3px 8px", fontSize: 10, fontWeight: 600, borderRadius: 4, border: "1px solid #DC2626", background: "#1E293B", color: "#FCA5A5", cursor: "pointer" }}>\u27F3 Reset</button>
        </div>
      </div>

      {/* STATS */}
      <div style={{ background: "#fff", borderBottom: "1px solid #E2E8F0", padding: "5px 14px", display: "flex", gap: 12, flexWrap: "wrap", fontSize: 10 }}>
        <span><strong>{stats.total}</strong> \u05EA\u05E8\u05D2\u05D9\u05DC\u05D9\u05DD</span>
        <span style={{ color: "#DC2626" }}>\u26D4 <strong>{stats.bl}</strong> \u05D7\u05D5\u05E1\u05DE\u05D9\u05DD</span>
        <span style={{ color: "#D97706" }}>\u26A0\uFE0F <strong>{stats.ch}</strong> \u05DC\u05D1\u05D3\u05D9\u05E7\u05D4</span>
        <span style={{ color: "#2563EB" }}>\u{1F4CB} <strong>{stats.gap}</strong> \u05E4\u05E2\u05E8\u05D9\u05DD</span>
        <span style={{ color: "#6B7280" }}>\u{1F3AF} <strong>{pool.length}</strong> \u05DC\u05D0 \u05DE\u05E9\u05D5\u05D1\u05E6\u05D9\u05DD</span>
      </div>

      {/* CLASS CARDS */}
      <div style={{ padding: "8px 10px 100px" }}>
        {fc.map(c => {
          const ri = cls.findIndex(x => x.n === c.n); const ic = coll[c.n];
          return (
            <div key={c.n} style={{ marginBottom: 6, background: "#fff", borderRadius: 7, border: "1px solid #E2E8F0", overflow: "hidden", boxShadow: "0 1px 2px rgba(0,0,0,.03)" }}>
              {/* HEADER */}
              <div onClick={() => setColl(p => ({ ...p, [c.n]: !p[c.n] }))} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: PC[c.p], color: "#fff", cursor: "pointer", userSelect: "none" }}>
                <span style={{ fontSize: 8, fontWeight: 600, opacity: .55 }}>\u05D7\u05DC\u05E7 {c.p}</span>
                <span className="heb" style={{ fontSize: 14, fontWeight: 800, lineHeight: 1.1 }}>{c.n}. {c.t}</span>
                <span style={{ fontSize: 10, opacity: .7 }}>{c.te}</span>
                <span style={{ flex: 1 }} />
                {c.s.some(s => s.fl === "blocker") && <span style={{ fontSize: 8, background: "rgba(255,255,255,.2)", padding: "1px 5px", borderRadius: 8 }}>\u26D4 {c.s.filter(s => s.fl === "blocker").length}</span>}
                {c.s.some(s => s.fl === "gap") && <span style={{ fontSize: 8, background: "rgba(255,255,255,.2)", padding: "1px 5px", borderRadius: 8 }}>\u{1F4CB} {c.s.filter(s => s.fl === "gap").length}</span>}
                <span style={{ fontSize: 10, opacity: .5 }}>{ic ? "\u25B8" : "\u25BE"}</span>
              </div>
              {/* COLLAPSED */}
              {ic && (<div style={{ padding: "5px 10px", display: "flex", alignItems: "center", gap: 3, flexWrap: "wrap" }}>
                {c.s.map((sl, si) => { const cat = CAT[sl.cat] || CAT.Skip; const fi = flg(sl.fl); return <span key={si} style={{ fontSize: 8, padding: "1px 4px", borderRadius: 3, background: fi ? fi.bg : cat.bg, border: "1px solid " + cat.bd, color: cat.c, fontWeight: 700, whiteSpace: "nowrap" }}>{sl.vid || (sl.cat === "Skip" ? "\u2014" : "TXT")}</span>; })}
              </div>)}
              {/* EXPANDED */}
              {!ic && (<div style={{ padding: "4px 6px 6px" }}>
                <div className="heb" style={{ fontSize: 9, color: "#64748B", padding: "2px 4px 3px" }}>{c.th}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 4 }}>
                  {c.s.map((sl, si) => {
                    const slot = SLOTS[si];
                    return (<div key={si}>
                      <div style={{ background: slot.bg, borderRadius: "4px 4px 0 0", padding: "2px 5px", textAlign: "center", border: "1px solid " + slot.bc, borderBottom: "none" }}>
                        <span style={{ fontSize: 8.5, fontWeight: 700, color: "#475569" }}>{slot.i} {slot.h}</span>
                      </div>
                      <Block it={sl} a="c" ci={ri} si={si} />
                    </div>);
                  })}
                </div>
              </div>)}
            </div>);
        })}

        {/* UNASSIGNED */}
        <div style={{ marginTop: 12, background: "#fff", borderRadius: 7, border: "2px dashed #CBD5E1", padding: 10 }} onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }} onDrop={e => handleDrop(e, { a: "u", si: pool.length })}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <span className="heb" style={{ fontSize: 13, fontWeight: 800 }}>\u{1F3AF} \u05E1\u05E8\u05D8\u05D5\u05E0\u05D9\u05DD \u05DC\u05D0 \u05DE\u05E9\u05D5\u05D1\u05E6\u05D9\u05DD</span>
            <span style={{ fontSize: 9, color: "#6B7280" }}>({pool.length} \u05E4\u05E8\u05D9\u05D8\u05D9\u05DD)</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: 4 }}>
            {pool.map((it, i) => <div key={it.id || i}><Block it={it} a="u" ci={null} si={i} /></div>)}
            {!pool.length && <div style={{ color: "#9CA3AF", fontSize: 11, padding: 8 }}>\u05D4\u05DB\u05DC \u05DE\u05E9\u05D5\u05D1\u05E5!</div>}
          </div>
        </div>
      </div>

      {/* EDIT MODAL */}
      {editing && (<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setEditing(null)}><div style={{ background: "#fff", borderRadius: 10, padding: 18, width: 380, maxWidth: "92vw", boxShadow: "0 20px 60px rgba(0,0,0,.3)" }} onClick={e => e.stopPropagation()}>
        <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700 }}>\u05E2\u05E8\u05D9\u05DB\u05EA \u05EA\u05E8\u05D2\u05D9\u05DC</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
          {[["Name (EN)", "name", false], ["\u05E9\u05DD (\u05E2\u05D1\u05E8\u05D9\u05EA)", "heb", true], ["Video ID", "vid", false], ["\u05D4\u05E2\u05E8\u05D4", "fn", false]].map(([lb, k, rtl]) =>
            <label key={k} style={{ fontSize: 10, fontWeight: 600 }}>{lb}<input dir={rtl ? "rtl" : "ltr"} value={ev[k] || ""} onChange={e => setEv(v => ({ ...v, [k]: e.target.value }))} style={{ width: "100%", padding: "4px 7px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 11, marginTop: 1, fontFamily: k === "vid" ? "'DM Mono',monospace" : "inherit" }} /></label>)}
          <label style={{ fontSize: 10, fontWeight: 600 }}>\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4<select value={ev.cat} onChange={e => setEv(v => ({ ...v, cat: e.target.value }))} style={{ width: "100%", padding: "4px 7px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 11, marginTop: 1 }}>{Object.entries(CAT).map(([k, v]) => <option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 5, marginTop: 12 }}>
          <button onClick={() => setEditing(null)} style={{ padding: "4px 12px", fontSize: 11, borderRadius: 4, border: "1px solid #D1D5DB", background: "#fff", cursor: "pointer" }}>\u05D1\u05D9\u05D8\u05D5\u05DC</button>
          <button onClick={saveEdit} style={{ padding: "4px 12px", fontSize: 11, fontWeight: 700, borderRadius: 4, border: "none", background: "#2563EB", color: "#fff", cursor: "pointer" }}>\u05E9\u05DE\u05D5\u05E8</button>
        </div>
      </div></div>)}

      {/* ADD MODAL */}
      {adding && (<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setAdding(null)}><div style={{ background: "#fff", borderRadius: 10, padding: 18, width: 380, maxWidth: "92vw", boxShadow: "0 20px 60px rgba(0,0,0,.3)" }} onClick={e => e.stopPropagation()}>
        <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700 }}>\u05D4\u05D5\u05E1\u05E4\u05EA \u05EA\u05E8\u05D2\u05D9\u05DC \u2014 \u05E9\u05D9\u05E2\u05D5\u05E8 {cls[adding.ci] && cls[adding.ci].n}, \u05DE\u05E9\u05D1\u05E6\u05EA {adding.si + 1}</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
          {[["Name (EN)", "name", false], ["\u05E9\u05DD (\u05E2\u05D1\u05E8\u05D9\u05EA)", "heb", true], ["Video ID", "vid", false]].map(([lb, k, rtl]) =>
            <label key={k} style={{ fontSize: 10, fontWeight: 600 }}>{lb}<input dir={rtl ? "rtl" : "ltr"} value={nv[k] || ""} onChange={e => setNv(v => ({ ...v, [k]: e.target.value }))} style={{ width: "100%", padding: "4px 7px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 11, marginTop: 1, fontFamily: k === "vid" ? "'DM Mono',monospace" : "inherit" }} /></label>)}
          <label style={{ fontSize: 10, fontWeight: 600 }}>Category<select value={nv.cat} onChange={e => setNv(v => ({ ...v, cat: e.target.value }))} style={{ width: "100%", padding: "4px 7px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 11, marginTop: 1 }}>{Object.entries(CAT).map(([k, v]) => <option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 5, marginTop: 12 }}>
          <button onClick={() => setAdding(null)} style={{ padding: "4px 12px", fontSize: 11, borderRadius: 4, border: "1px solid #D1D5DB", background: "#fff", cursor: "pointer" }}>\u05D1\u05D9\u05D8\u05D5\u05DC</button>
          <button onClick={doAdd} style={{ padding: "4px 12px", fontSize: 11, fontWeight: 700, borderRadius: 4, border: "none", background: "#059669", color: "#fff", cursor: "pointer" }}>\u05D4\u05D5\u05E1\u05E3</button>
        </div>
      </div></div>)}
    </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
