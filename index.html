function App() {
  const [cls, setCls] = useState(()=>clone(IC));
  const [pool, setPool] = useState(()=>clone(IU));

  const [ovr, setOvr] = useState(null);
  const [editing, setEditing] = useState(null);
  const [ev, setEv] = useState({});
  const [adding, setAdding] = useState(null);

  const [filt, setFilt] = useState("all");
  const [coll, setColl] = useState({});

  const push = useCallback(()=>{setHist(h=>[...h.slice(-40),{c:clone(cls),p:clone(pool)}]);setFut([]);},[cls,pool]);

  const redo = useCallback(()=>{if(!fut.length)return;const next=fut[fut.length-1];setHist(h=>[...h,{c:clone(cls),p:clone(pool)}]);setCls(next.c);setPool(next.p);setFut(f=>f.slice(0,-1));},[fut,cls,pool]);
  const reset = ()=>{push();setCls(clone(IC));setPool(clone(IU));};

  useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo();}if((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))){e.preventDefault();redo();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[undo,redo]);

  const dS=(e,s)=>{setSrc(s);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","");};
  const dO=(e,t)=>{e.preventDefault();e.dataTransfer.dropEffect="move";setOvr(t);};
  const dD=(e,t)=>{e.preventDefault();setOvr(null);if(!src)return;if(src.a===t.a&&src.ci===t.ci&&src.si===t.si)return;push();const nc=clone(cls),np=clone(pool);let si;if(src.a==="c")si=nc[src.ci].s[src.si];else si=np[src.si];if(t.a==="c"){const ti=nc[t.ci].s[t.si];if(src.a==="c"){nc[t.ci].s[t.si]=si;nc[src.ci].s[src.si]=ti;}else{nc[t.ci].s[t.si]=si;np[src.si]=ti;}}else{if(src.a==="c"){np.push(si);nc[src.ci].s[src.si]=mk("(empty)","","","Skip");}else{const[r]=np.splice(src.si,1);np.splice(t.si,0,r);}}setCls(nc);setPool(np);setSrc(null);};

  const del=(a,ci,si)=>{push();if(a==="c"){const nc=clone(cls);const r=nc[ci].s[si];nc[ci].s[si]=mk("(empty)","","","Skip");setCls(nc);if(r.name!=="(empty)"&&r.cat!=="Skip")setPool(p=>[...p,r]);}else{const np=clone(pool);np.splice(si,1);setPool(np);}};
  const startEdit=(a,ci,si)=>{const it=a==="c"?cls[ci].s[si]:pool[si];setEditing({a,ci,si});setEv({name:it.name,heb:it.heb,vid:it.vid,cat:it.cat,fn:it.fn||""});};
  const saveEdit=()=>{if(!editing)return;push();const{a,ci,si}=editing;if(a==="c"){const nc=clone(cls);Object.assign(nc[ci].s[si],ev);setCls(nc);}else{const np=clone(pool);Object.assign(np[si],ev);setPool(np);}setEditing(null);};
  const openAdd=(ci,si)=>{setAdding({ci,si});setNv({name:"",heb:"",vid:"",cat:"Cat 1",fl:null,fn:""});};
  const doAdd=()=>{if(!adding)return;push();const nc=clone(cls);nc[adding.ci].s[adding.si]={...nv,id:uid()};setCls(nc);setAdding(null);};

  const stats={total:cls.reduce((a,c)=>a+c.s.filter(s=>s.cat!=="Skip"&&s.name!=="(empty)").length,0),bl:cls.reduce((a,c)=>a+c.s.filter(s=>s.fl==="blocker").length,0),gap:cls.reduce((a,c)=>a+c.s.filter(s=>s.fl==="gap").length,0),ch:cls.reduce((a,c)=>a+c.s.filter(s=>s.fl==="check").length,0)};

  /* ── EXERCISE BLOCK ── */
  const Block=({it,a,ci,si,slot})=>{
    const cat=CAT[it.cat]||CAT.Skip;const fi=flg(it.fl);const dragging=src?.a===a&&src?.ci===ci&&src?.si===si;const dropping=ovr?.a===a&&ovr?.ci===ci&&ovr?.si===si;
    if(it.name==="(empty)"||(!it.name&&!it.vid))return(
      <div onDragOver={e=>dO(e,{a,ci,si})} onDrop={e=>dD(e,{a,ci,si})} onDragLeave={()=>setOvr(null)} onClick={()=>a==="c"&&openAdd(ci,si)}
        style={{border:`2px dashed ${dropping?"#3B82F6":"#D1D5DB"}`,background:dropping?"#EFF6FF":"#FAFAFA",borderRadius:8,padding:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .12s",minHeight:56}}>
        <span style={{color:"#9CA3AF",fontSize:12}}>+ הוסף</span>
      </div>);
    return(
      <div draggable onDragStart={e=>dS(e,{a,ci,si})} onDragOver={e=>dO(e,{a,ci,si})} onDrop={e=>dD(e,{a,ci,si})} onDragLeave={()=>setOvr(null)} onDoubleClick={()=>startEdit(a,ci,si)}
        style={{background:cat.bg,border:`1.5px solid ${dropping?"#3B82F6":cat.bd}`,borderRadius:8,padding:"8px 10px",cursor:"grab",position:"relative",opacity:dragging?.35:1,transition:"all .12s",minHeight:56,boxShadow:dropping?"0 0 0 2px #3B82F6":"0 1px 3px rgba(0,0,0,.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",marginBottom:2}}>
              {it.vid&&<span className="mono" style={{display:"inline-block",background:cat.c,color:"#fff",fontSize:10,fontWeight:600,padding:"1px 5px",borderRadius:4,letterSpacing:.3}}>{it.vid}</span>}
              {it.cat!=="Skip"&&it.cat!=="Text"&&<span style={{display:"inline-block",background:"rgba(0,0,0,.06)",color:cat.c,fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:4}}>{cat.l}</span>}
            </div>
            {it.heb&&<div className="heb" style={{fontSize:14,fontWeight:800,color:"#111827",lineHeight:1.25,marginTop:2}}>{it.heb}</div>}
            <div style={{fontSize:11,color:"#6B7280",lineHeight:1.2,marginTop:2}}>{it.name}</div>
          </div>
          <button onClick={e=>{e.stopPropagation();del(a,ci,si);}} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:14,padding:"0 2px",lineHeight:1,flexShrink:0}} title="Remove">×</button>
        </div>
        {fi&&<div style={{marginTop:4,display:"flex",alignItems:"center",gap:3,background:fi.bg,borderRadius:4,padding:"2px 6px"}}>
          <span style={{fontSize:10}}>{fi.i}</span><span style={{fontSize:9,fontWeight:700,color:fi.tc,letterSpacing:.3}}>{fi.t}</span>
          {it.fn&&<span style={{fontSize:9,color:"#78716C",marginLeft:3}}>{it.fn}</span>}
        </div>}
      </div>
    );
  };

  const fc=filt==="all"?cls:cls.filter(c=>c.p===filt);

  return(
    <div style={{minHeight:"100vh",maxWidth:900,margin:"0 auto"}}>
      {/* TOOLBAR */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"#0F172A",color:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontWeight:800,fontSize:16,letterSpacing:-.5}}>איתן ברוח</span>
          <span style={{fontSize:11,color:"#94A3B8"}}>מיפוי תרגילים</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:3,marginRight:6}}>
            {["all","A","B","C"].map(f=><button key={f} onClick={()=>setFilt(f)} style={{padding:"3px 10px",fontSize:11,fontWeight:700,borderRadius:4,border:"none",cursor:"pointer",background:filt===f?"#3B82F6":"#334155",color:filt===f?"#fff":"#94A3B8",transition:"all .12s"}}>{f==="all"?"הכל":`חלק ${f}`}</button>)}
          </div>
          <button onClick={undo} disabled={!hist.length} style={{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:4,border:"1px solid #475569",background:"#1E293B",color:hist.length?"#E2E8F0":"#475569",cursor:hist.length?"pointer":"default"}}>↶ Undo</button>
          <button onClick={redo} disabled={!fut.length} style={{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:4,border:"1px solid #475569",background:"#1E293B",color:fut.length?"#E2E8F0":"#475569",cursor:fut.length?"pointer":"default"}}>↷ Redo</button>
          <button onClick={reset} style={{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:4,border:"1px solid #DC2626",background:"#1E293B",color:"#FCA5A5",cursor:"pointer"}}>⟳ Reset</button>
        </div>
      </div>

      {/* STATS */}
      <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"8px 16px",display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
        <span><strong>{stats.total}</strong> תרגילים</span>
        <span style={{color:"#DC2626"}}>⛔ <strong>{stats.bl}</strong> חוסמים</span>
        <span style={{color:"#D97706"}}>⚠️ <strong>{stats.ch}</strong> לבדיקה</span>
        <span style={{color:"#2563EB"}}>📋 <strong>{stats.gap}</strong> פערים</span>
        <span style={{color:"#6B7280"}}>🎯 <strong>{pool.length}</strong> לא משובצים</span>
      </div>

      {/* CLASS CARDS */}
      <div style={{padding:"12px 12px 120px"}}>
        {fc.map(c=>{
          const ri=cls.findIndex(x=>x.n===c.n);const ic=coll[c.n];
          return(
            <div key={c.n} style={{marginBottom:10,background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
              {/* CLASS HEADER */}
              <div onClick={()=>setColl(p=>({...p,[c.n]:!p[c.n]}))} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:PC[c.p],color:"#fff",cursor:"pointer",userSelect:"none"}}>
                <div style={{display:"flex",alignItems:"baseline",gap:6,flex:1}}>
                  <span style={{fontSize:10,fontWeight:600,opacity:.6}}>חלק {c.p}</span>
                  <span className="heb" style={{fontSize:18,fontWeight:800,lineHeight:1.1}}>{c.n}. {c.t}</span>
                  <span style={{fontSize:11,opacity:.7}}>{c.te}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {/* Mini flag summary */}
                  {c.s.some(s=>s.fl==="blocker")&&<span style={{fontSize:9,background:"rgba(255,255,255,.2)",padding:"1px 6px",borderRadius:10}}>⛔ {c.s.filter(s=>s.fl==="blocker").length}</span>}
                  {c.s.some(s=>s.fl==="gap")&&<span style={{fontSize:9,background:"rgba(255,255,255,.2)",padding:"1px 6px",borderRadius:10}}>📋 {c.s.filter(s=>s.fl==="gap").length}</span>}
                  <span style={{fontSize:11,opacity:.6}}>{ic?"▸":"▾"}</span>
                </div>
              </div>

              {/* CLASS THEME */}
              {!ic&&<div className="heb" style={{padding:"6px 14px",background:PCbg[c.p],fontSize:12,color:"#64748B",borderBottom:"1px solid #E2E8F0"}}>{c.th}</div>}

              {/* COLLAPSED — mini pills */}
              {ic&&(
                <div style={{padding:"8px 14px",display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  {c.s.map((sl,si)=>{const cat=CAT[sl.cat]||CAT.Skip;const fi=flg(sl.fl);return<span key={si} style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:fi?fi.bg:cat.bg,border:`1px solid ${cat.bd}`,color:cat.c,fontWeight:700,whiteSpace:"nowrap"}}>{sl.vid||(sl.cat==="Skip"?"—":"TXT")}</span>;})}
                </div>
              )}

              {/* EXPANDED — slot rows */}
              {!ic&&(
                <div style={{padding:"6px 10px 10px"}} onClick={e=>e.stopPropagation()}>
                  {c.s.map((sl,si)=>{
                    const slot = SLOTS[si];
                    return(
                      <div key={si} style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:8,marginBottom:si<c.s.length-1?6:0,alignItems:"stretch"}}>
                        {/* SLOT LABEL */}
                        <div style={{background:slot.bg,border:`1.5px solid ${slot.bc}`,borderRadius:8,padding:"6px 8px",display:"flex",flexDirection:"column",justifyContent:"center",minHeight:56}}>
                          <div style={{fontSize:13,fontWeight:800,color:"#1E293B",lineHeight:1.15}}>{slot.i} {slot.h}</div>
                          <div style={{fontSize:10,color:"#64748B"}}>{slot.e}</div>
                        </div>
                        {/* EXERCISE BLOCK */}
                        <Block it={sl} a="c" ci={ri} si={si} slot={slot}/>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        {/* UNASSIGNED POOL */}
        <div style={{marginTop:20,background:"#fff",borderRadius:10,border:"2px dashed #CBD5E1",padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span className="heb" style={{fontSize:15,fontWeight:800}}>🎯 סרטונים לא משובצים</span>
            <span style={{fontSize:11,color:"#6B7280"}}>({pool.length} פריטים — גרור למשבצת)</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))",gap:6}} onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";}} onDrop={e=>dD(e,{a:"u",si:pool.length})}>
            {pool.map((it,i)=><div key={it.id||i}><Block it={it} a="u" ci={null} si={i}/></div>)}
            {!pool.length&&<div style={{color:"#9CA3AF",fontSize:12,padding:10}}>הכל משובץ!</div>}
          </div>
        </div>
      </div>

      {/* EDIT MODAL */}
      {editing&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setEditing(null)}><div style={{background:"#fff",borderRadius:12,padding:22,width:420,maxWidth:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 14px",fontSize:16,fontWeight:700}}>עריכת תרגיל</h3>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {[["Name (EN)","name",false],["שם (עברית)","heb",true],["Video ID","vid",false],["הערה","fn",false]].map(([lb,k,rtl])=>
            <label key={k} style={{fontSize:12,fontWeight:600}}>{lb}<input dir={rtl?"rtl":"ltr"} value={ev[k]||""} onChange={e=>setEv(v=>({...v,[k]:e.target.value}))} style={{width:"100%",padding:"6px 9px",border:"1px solid #D1D5DB",borderRadius:5,fontSize:13,marginTop:2,fontFamily:k==="vid"?"'DM Mono',monospace":"inherit"}}/></label>)}
          <label style={{fontSize:12,fontWeight:600}}>קטגוריה<select value={ev.cat} onChange={e=>setEv(v=>({...v,cat:e.target.value}))} style={{width:"100%",padding:"6px 9px",border:"1px solid #D1D5DB",borderRadius:5,fontSize:13,marginTop:2}}>{Object.entries(CAT).map(([k,v])=><option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:14}}>
          <button onClick={()=>setEditing(null)} style={{padding:"6px 16px",fontSize:12,borderRadius:5,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>ביטול</button>
          <button onClick={saveEdit} style={{padding:"6px 16px",fontSize:12,fontWeight:700,borderRadius:5,border:"none",background:"#2563EB",color:"#fff",cursor:"pointer"}}>שמור</button>
        </div>
      </div></div>)}

      {/* ADD MODAL */}
      {adding&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setAdding(null)}><div style={{background:"#fff",borderRadius:12,padding:22,width:420,maxWidth:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 14px",fontSize:16,fontWeight:700}}>הוספת תרגיל — שיעור {cls[adding.ci]?.n}, משבצת {adding.si+1}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {[["Name (EN)","name",false],["שם (עברית)","heb",true],["Video ID","vid",false]].map(([lb,k,rtl])=>
            <label key={k} style={{fontSize:12,fontWeight:600}}>{lb}<input dir={rtl?"rtl":"ltr"} value={nv[k]||""} onChange={e=>setNv(v=>({...v,[k]:e.target.value}))} style={{width:"100%",padding:"6px 9px",border:"1px solid #D1D5DB",borderRadius:5,fontSize:13,marginTop:2,fontFamily:k==="vid"?"'DM Mono',monospace":"inherit"}}/></label>)}
          <label style={{fontSize:12,fontWeight:600}}>Category<select value={nv.cat} onChange={e=>setNv(v=>({...v,cat:e.target.value}))} style={{width:"100%",padding:"6px 9px",border:"1px solid #D1D5DB",borderRadius:5,fontSize:13,marginTop:2}}>{Object.entries(CAT).map(([k,v])=><option key={k} value={k}>{k}: {v.l}</option>)}</select></label>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:14}}>
          <button onClick={()=>setAdding(null)} style={{padding:"6px 16px",fontSize:12,borderRadius:5,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>ביטול</button>
          <button onClick={doAdd} style={{padding:"6px 16px",fontSize:12,fontWeight:700,borderRadius:5,border:"none",background:"#059669",color:"#fff",cursor:"pointer"}}>הוסף</button>
        </div>
      </div></div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
